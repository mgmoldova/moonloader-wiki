site_name: MoonLoader Wiki
site_url: https://mgmoldova.github.io/moonloader-wiki/ 
repo_url: https://github.com/mgmoldova/moonloader-wiki 

theme:
  name: material
  language: ru
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep blue
      accent: deep blue
      toggle:
        icon: material/weather-sunny
        name: Перейти на темную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep blue
      accent: deep blue
      toggle:
        icon: material/weather-night
        name: Перейти на светлую тему

  
  features:
    - navigation.tabs          
    - navigation.sections      
    - navigation.top           
    - navigation.tracking      
    - search.suggest          
    - search.highlight         
    - content.code.copy        

plugins:
  - search

markdown_extensions:
  - tables                     
  - pymdownx.highlight:        
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences       
  - pymdownx.tabbed:
      alternate_style: true    
  - admonition                 
  - pymdownx.details           